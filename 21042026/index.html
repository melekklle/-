<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Yapılacaklar Listesi</title>
    <style>
        body {
            font-family: Arial;
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            margin: 10px;
            padding: 10px;
            background: #f2f2f2;
            cursor: pointer;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        button {
            margin-left: 10px;
        }
    </style>
</head>
<body>

    <h2>Yapılacaklar Listesi</h2>

    <input type="text" id="taskInput" placeholder="Görev gir...">
    <button id="addBtn">Ekle</button>

    <ul id="taskList"></ul>

    <script src="script.js"></script>
</body>
</html>
